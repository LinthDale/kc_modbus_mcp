name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      # 啟動模擬器，讓整合測試也能跑
      - name: Start Modbus simulator
        run: |
          uv run python simulator.py &
          sleep 3

      - name: Run tests
        run: uv run python -m pytest tests/ -v

      - name: Stop simulator
        if: always()
        run: pkill -f "python simulator.py" || true
